# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g default-terminal "screen-256color"

set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

# xcodedark palette (matches nvim's xcodedark.nvim colors.lua)
set -g @nova-pane-active-border-style "#FF7AB2"
set -g @nova-pane-border-style "#292a31"
set -g @nova-status-style-bg "#2D2D30"
set -g @nova-status-style-fg "#D4D4D4"
set -g @nova-status-style-active-bg "#FF7AB2"
set -g @nova-status-style-active-fg "#292a31"
set -g @nova-status-style-double-bg "#2D2D30"

set -g @nova-pane "#I#{?pane_in_mode,  #{pane_mode},}  #W"

set -g @nova-segment-mode "#{?client_prefix,Ω,ω}"
set -g @nova-segment-mode-colors "#6BDFFF #292a31"

set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "#6BDFFF #292a31"

set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "whoami"

set-option -g set-clipboard on

# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy
# bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel wl-copy

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
