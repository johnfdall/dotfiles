# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'o0th/tmux-nova'
# NOTE: the tmux side of christoomey/vim-tmux-navigator is intentionally NOT
# loaded as a plugin. Its is_vim detection regex is regenerated per-machine and
# the version that lands on macOS never matches under BSD grep, so Ctrl-hjkl
# silently fell back to pane-switching there. We define the bindings ourselves
# at the bottom of this file with a portable regex instead. (The Neovim side of
# the plugin is still installed via the nvim config and is unaffected.)

set -g default-terminal "screen-256color"

set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left î‚¸
set -g @nova-nerdfonts-right î‚ş

# xcodedark palette (matches nvim's xcodedark.nvim colors.lua)
set -g @nova-pane-active-border-style "#FF7AB2"
set -g @nova-pane-border-style "#292a31"
set -g @nova-status-style-bg "#2D2D30"
set -g @nova-status-style-fg "#D4D4D4"
set -g @nova-status-style-active-bg "#FF7AB2"
set -g @nova-status-style-active-fg "#292a31"
set -g @nova-status-style-double-bg "#2D2D30"

set -g @nova-pane "#I#{?pane_in_mode, ď‘  #{pane_mode},} ď‘  #W"

set -g @nova-segment-mode "#{?client_prefix,Î©,Ď‰}"
set -g @nova-segment-mode-colors "#6BDFFF #292a31"

set -g @nova-segment-whoami "#(whoami)@#h"
set -g @nova-segment-whoami-colors "#6BDFFF #292a31"

set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "whoami"

set-option -g set-clipboard on

# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel wl-copy
# bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel wl-copy

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode after dragging with mouse

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# --- vim-tmux-navigator: portable Ctrl-hjkl navigation between nvim & tmux ---
# Defined after tpm so nothing overrides it. The regex below matches a bare
# `nvim`/`vim` process name under both GNU grep (Linux) and BSD grep (macOS) --
# verified live on both. This replaces the tmux side of vim-tmux-navigator.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
